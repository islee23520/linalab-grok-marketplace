name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: git diff --exit-code -- dist/cli.mjs
      - name: Grok smoke (when CLI is available)
        run: |
          if command -v grok >/dev/null; then
            bun run smoke:grok
          else
            echo "grok CLI unavailable; skipping local install smoke"
          fi
